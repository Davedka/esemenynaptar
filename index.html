<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Eseménynaptár - Bejelentkezés</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1f2933, #111827);
    color: #e5e7eb;
    min-height: 100vh;
}

header {
    text-align: center;
    padding: 30px 20px;
    font-size: 28px;
    font-weight: 700;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 20px;
}

.auth-container {
    max-width: 500px;
    margin: 50px auto;
    padding: 20px;
}

.card {
    background: #1f2937;
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h2 { margin-top: 0; }

input, select, button, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
}

input, select, textarea {
    background: #111827;
    color: #e5e7eb;
}

button {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
}

button:hover {
    transform: translateY(-2px);
}

button.secondary {
    background: #374151;
    margin-top: 10px;
}

button.danger {
    background: linear-gradient(135deg, #ef4444, #dc2626);
}

.event {
    background: #111827;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
    border-left: 4px solid #8b5cf6;
}

.status {
    margin-top:5px;
    font-size:12px;
    color:#22c55e;
    font-weight:600;
}

.calendar-header {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.calendar-header button {
    flex: 1;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

.day {
    background: #111827;
    border-radius: 12px;
    padding: 10px;
    min-height: 90px;
    font-size: 12px;
}

.event-dot {
    margin-top: 6px;
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 10px;
    background: #6366f1;
    color: white;
    cursor: pointer;
}

.user-info {
    background: #111827;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.role-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    margin-left: 10px;
}

.role-teacher {
    background: #10b981;
    color: white;
}

.role-student {
    background: #3b82f6;
    color: white;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
    font-size: 13px;
}

.tab-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.tab-buttons button {
    flex: 1;
    background: #374151;
}

.tab-buttons button.active {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
}

.student-event {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 3px;
}

@media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div id="authPage" class="auth-container">
    <div class="card">
        <h2 style="text-align: center;">📚 Eseménynaptár</h2>
        
        <div class="tab-buttons">
            <button onclick="showLoginTab()" id="loginTab" class="active">Bejelentkezés</button>
            <button onclick="showRegisterTab()" id="registerTab">Regisztráció</button>
        </div>

        <!-- Bejelentkezés -->
        <div id="loginForm">
            <div class="form-group">
                <label>Felhasználónév</label>
                <input type="text" id="loginUsername" placeholder="Felhasználónév">
            </div>
            <div class="form-group">
                <label>Jelszó</label>
                <input type="password" id="loginPassword" placeholder="Jelszó">
            </div>
            <button onclick="login()">Bejelentkezés</button>
        </div>

        <!-- Regisztráció -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Szerepkör</label>
                <select id="registerRole" onchange="toggleStudentFields()">
                    <option value="student">Tanuló</option>
                    <option value="teacher">Tanár</option>
                </select>
            </div>

            <div class="form-group">
                <label>Iskola</label>
                <select id="registerSchool">
                    <option value="MSZC">MSZC - Művészeti Szakképzési Centrum</option>
                    <option value="SZIC">SZIC - Szolgáltatási Integrált Centrum</option>
                    <option value="KSZC">KSZC - Kereskedelmi Szakképzési Centrum</option>
                </select>
            </div>

            <div class="form-group">
                <label>Teljes név</label>
                <input type="text" id="registerFullname" placeholder="Teljes név">
            </div>

            <div class="form-group">
                <label>Felhasználónév</label>
                <input type="text" id="registerUsername" placeholder="Felhasználónév">
            </div>

            <div class="form-group">
                <label>Jelszó</label>
                <input type="password" id="registerPassword" placeholder="Jelszó (min. 6 karakter)">
            </div>

            <!-- Tanulói mezők -->
            <div id="studentFields">
                <div class="form-group">
                    <label>OM azonosító</label>
                    <input type="text" id="registerOM" placeholder="11 számjegyű OM azonosító" maxlength="11">
                </div>

                <div class="form-group">
                    <label>Osztály</label>
                    <input type="text" id="registerClass" placeholder="pl. 9.A">
                </div>

                <div class="form-group">
                    <label>Születési dátum</label>
                    <input type="date" id="registerBirthdate">
                </div>
            </div>

            <button onclick="register()">Regisztráció</button>
        </div>
    </div>
</div>

<!-- Fő alkalmazás -->
<div id="mainApp" class="hidden">
    <header>Eseménynaptár</header>

    <div class="container">

        <div class="card">
            <div class="user-info">
                <strong id="userDisplayName"></strong>
                <span id="userRoleBadge"></span>
                <div style="margin-top: 8px; font-size: 13px; color: #9ca3af;" id="userSchoolInfo"></div>
            </div>

            <button class="danger" onclick="logout()">Kijelentkezés</button>

            <h2 style="margin-top:25px;">Új esemény</h2>

            <input type="text" id="title" placeholder="Esemény neve">
            <input type="date" id="date">

            <select id="category">
                <option>Oktatás</option>
                <option>Sport</option>
                <option>Szórakozás</option>
                <option>Vizsga</option>
                <option>Egyéb</option>
            </select>

            <textarea id="description" rows="3" placeholder="Leírás (opcionális)"></textarea>

            <div id="eventCounter" style="margin-top: 10px; padding: 10px; background: #111827; border-radius: 8px; text-align: center; font-size: 13px;"></div>

            <button onclick="addEvent()">Hozzáadás</button>

            <h2 style="margin-top:25px;">Események</h2>
            <div id="eventList"></div>
        </div>

        <div class="card">

            <h2 id="monthYear" style="text-align:center;"></h2>

            <div class="calendar-header">
                <button onclick="prevMonth()">‹ Előző</button>
                <button onclick="nextMonth()">Következő ›</button>
            </div>

            <div class="calendar" id="calendar"></div>

        </div>

    </div>
</div>

<script>
// Adatstruktúrák
let users = JSON.parse(localStorage.getItem("users")) || [];
let events = JSON.parse(localStorage.getItem("events")) || [];
let currentUser = JSON.parse(sessionStorage.getItem("currentUser")) || null;

let currentDate = new Date();
let currentMonth = currentDate.getMonth();
let currentYear = currentDate.getFullYear();

// Inicializálás
window.onload = function () {
    const today = new Date().toISOString().split("T")[0];
    const dateInput = document.getElementById("date");
    if (dateInput) {
        dateInput.min = today;
    }
    
    if (currentUser) {
        showMainApp();
    } else {
        showAuthPage();
    }
};

// Auth funkciók
function showLoginTab() {
    document.getElementById("loginTab").classList.add("active");
    document.getElementById("registerTab").classList.remove("active");
    document.getElementById("loginForm").classList.remove("hidden");
    document.getElementById("registerForm").classList.add("hidden");
}

function showRegisterTab() {
    document.getElementById("registerTab").classList.add("active");
    document.getElementById("loginTab").classList.remove("active");
    document.getElementById("registerForm").classList.remove("hidden");
    document.getElementById("loginForm").classList.add("hidden");
}

function toggleStudentFields() {
    const role = document.getElementById("registerRole").value;
    const studentFields = document.getElementById("studentFields");
    
    if (role === "student") {
        studentFields.classList.remove("hidden");
    } else {
        studentFields.classList.add("hidden");
    }
}

function login() {
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value;

    if (!username || !password) {
        return alert("Töltsd ki az összes mezőt!");
    }

    const user = users.find(u => u.username === username && u.password === password);

    if (!user) {
        return alert("Hibás felhasználónév vagy jelszó!");
    }

    currentUser = user;
    sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
    showMainApp();
}

function register() {
    const role = document.getElementById("registerRole").value;
    const school = document.getElementById("registerSchool").value;
    const fullname = document.getElementById("registerFullname").value.trim();
    const username = document.getElementById("registerUsername").value.trim();
    const password = document.getElementById("registerPassword").value;

    if (!fullname || !username || !password) {
        return alert("Töltsd ki az összes kötelező mezőt!");
    }

    if (password.length < 6) {
        return alert("A jelszónak legalább 6 karakter hosszúnak kell lennie!");
    }

    if (users.find(u => u.username === username)) {
        return alert("Ez a felhasználónév már foglalt!");
    }

    const newUser = {
        id: Date.now(),
        role,
        school,
        fullname,
        username,
        password,
        createdAt: new Date().toISOString()
    };

    // Tanulói adatok
    if (role === "student") {
        const om = document.getElementById("registerOM").value.trim();
        const classInfo = document.getElementById("registerClass").value.trim();
        const birthdate = document.getElementById("registerBirthdate").value;

        if (!om || !classInfo || !birthdate) {
            return alert("Tanulóként töltsd ki az összes tanulói adatot!");
        }

        if (om.length !== 11 || !/^\d+$/.test(om)) {
            return alert("Az OM azonosító 11 számjegyű kell legyen!");
        }

        newUser.om = om;
        newUser.class = classInfo;
        newUser.birthdate = birthdate;
    }

    users.push(newUser);
    localStorage.setItem("users", JSON.stringify(users));

    alert("Sikeres regisztráció! Most már bejelentkezhetsz.");
    showLoginTab();
    
    // Űrlap ürítése
    document.getElementById("registerFullname").value = "";
    document.getElementById("registerUsername").value = "";
    document.getElementById("registerPassword").value = "";
    document.getElementById("registerOM").value = "";
    document.getElementById("registerClass").value = "";
    document.getElementById("registerBirthdate").value = "";
}

function logout() {
    if (confirm("Biztosan ki szeretnél jelentkezni?")) {
        currentUser = null;
        sessionStorage.removeItem("currentUser");
        showAuthPage();
    }
}

function showAuthPage() {
    document.getElementById("authPage").classList.remove("hidden");
    document.getElementById("mainApp").classList.add("hidden");
}

function showMainApp() {
    document.getElementById("authPage").classList.add("hidden");
    document.getElementById("mainApp").classList.remove("hidden");
    
    // Felhasználói info megjelenítése
    const roleBadge = currentUser.role === "teacher" 
        ? '<span class="role-badge role-teacher">Tanár</span>'
        : '<span class="role-badge role-student">Tanuló</span>';
    
    document.getElementById("userDisplayName").textContent = currentUser.fullname;
    document.getElementById("userRoleBadge").innerHTML = roleBadge;
    
    let schoolInfo = currentUser.school;
    if (currentUser.role === "student") {
        schoolInfo += ` • ${currentUser.class} osztály`;
    }
    document.getElementById("userSchoolInfo").textContent = schoolInfo;
    
    renderAll();
}

// Esemény kezelés
function saveEvents() {
    localStorage.setItem("events", JSON.stringify(events));
}

function cleanOldEvents() {
    const now = new Date();
    now.setHours(0,0,0,0);

    events = events.filter(e => {
        const d = new Date(e.date);
        return d >= now;
    });

    saveEvents();
}

function addEvent() {
    const title = document.getElementById("title").value.trim();
    const date = document.getElementById("date").value;
    const category = document.getElementById("category").value;
    const description = document.getElementById("description").value.trim();

    if (!title || !date) return alert("Add meg az esemény nevét és dátumát!");

    // Esemény limit ellenőrzés (maximum 3 esemény felhasználónként)
    const userEventCount = events.filter(e => e.userId === currentUser.id).length;
    if (userEventCount >= 3) {
        return alert("⚠️ Maximum 3 eseményt hozhatsz létre! Törölj egy meglévő eseményt, ha újat szeretnél hozzáadni.");
    }

    events.push({ 
        id: Date.now(),
        title, 
        date, 
        category,
        description,
        userId: currentUser.id,
        userName: currentUser.fullname,
        userRole: currentUser.role,
        createdAt: new Date().toISOString()
    });
    
    saveEvents();

    // Űrlap ürítése
    document.getElementById("title").value = "";
    document.getElementById("date").value = "";
    document.getElementById("description").value = "";

    renderAll();
}

function deleteEvent(eventId) {
    if (confirm("Biztosan törölni szeretnéd ezt az eseményt?")) {
        events = events.filter(e => e.id !== eventId);
        saveEvents();
        renderAll();
    }
}

function renderEvents() {
    const list = document.getElementById("eventList");
    list.innerHTML = "";

    const today = new Date();
    today.setHours(0,0,0,0);

    // Szűrés: tanár mindent lát, tanuló csak a sajátját
    let filteredEvents = events;
    if (currentUser.role === "student") {
        filteredEvents = events.filter(e => e.userId === currentUser.id);
    }

    filteredEvents.sort((a,b) => new Date(a.date) - new Date(b.date));

    if (filteredEvents.length === 0) {
        list.innerHTML = '<div style="padding: 20px; text-align: center; color: #9ca3af;">Még nincsenek események</div>';
        return;
    }

    filteredEvents.forEach(e => {
        const d = new Date(e.date);
        let status = "";

        if (d.getTime() === today.getTime()) {
            status = `<div class="status">Folyamatban</div>`;
        }

        const isOwn = e.userId === currentUser.id;
        const deleteBtn = isOwn || currentUser.role === "teacher" 
            ? `<button onclick="deleteEvent(${e.id})" class="danger" style="margin-top: 10px; padding: 8px;">Törlés</button>`
            : '';

        const studentInfo = currentUser.role === "teacher" && e.userRole === "student"
            ? `<div class="student-event">👤 ${e.userName}</div>`
            : '';

        list.innerHTML += `
            <div class="event">
                <strong>${e.title}</strong><br>
                📅 ${e.date}<br>
                📂 ${e.category}
                ${e.description ? `<div style="margin-top: 8px; font-size: 12px; color: #d1d5db;">${e.description}</div>` : ''}
                ${studentInfo}
                ${status}
                ${deleteBtn}
            </div>`;
    });
}

function updateEventCounter() {
    const counter = document.getElementById("eventCounter");
    if (!counter) return;

    const userEventCount = events.filter(e => e.userId === currentUser.id).length;
    const remaining = 3 - userEventCount;

    if (remaining > 0) {
        counter.innerHTML = `📊 <strong>${userEventCount}/3</strong> esemény létrehozva | <span style="color: #22c55e;">Még ${remaining} eseményt hozhatsz létre</span>`;
    } else {
        counter.innerHTML = `📊 <strong>${userEventCount}/3</strong> esemény létrehozva | <span style="color: #ef4444;">Elérted a limitet!</span>`;
    }
}

function renderCalendar() {
    const cal = document.getElementById("calendar");
    const monthYear = document.getElementById("monthYear");
    cal.innerHTML = "";

    const months = ["Január","Február","Március","Április","Május","Június",
                    "Július","Augusztus","Szeptember","Október","November","December"];

    monthYear.textContent = months[currentMonth] + " " + currentYear;

    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const startDay = firstDay === 0 ? 6 : firstDay - 1; // Hétfőtől kezdjük

    // Hét napjai fejléc
    const dayNames = ["H", "K", "Sz", "Cs", "P", "Szo", "V"];
    dayNames.forEach(name => {
        const header = document.createElement("div");
        header.style.textAlign = "center";
        header.style.fontWeight = "600";
        header.style.marginBottom = "5px";
        header.textContent = name;
        cal.appendChild(header);
    });

    // Üres cellák a hónap eleje előtt
    for (let i = 0; i < startDay; i++) {
        const emptyDay = document.createElement("div");
        cal.appendChild(emptyDay);
    }

    // Naptár napjai
    for (let i = 1; i <= daysInMonth; i++) {
        const dayBox = document.createElement("div");
        dayBox.className = "day";
        dayBox.innerHTML = `<strong>${i}</strong>`;

        // Szűrés: tanár mindent lát, tanuló csak a sajátját
        let filteredEvents = events;
        if (currentUser.role === "student") {
            filteredEvents = events.filter(e => e.userId === currentUser.id);
        }

        filteredEvents.forEach(e => {
            const d = new Date(e.date);
            if (d.getDate() === i && d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                const dot = document.createElement("div");
                dot.className = "event-dot";
                dot.textContent = e.title;
                dot.title = `${e.title} - ${e.category}`;
                dayBox.appendChild(dot);
            }
        });

        cal.appendChild(dayBox);
    }
}

function prevMonth() {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
}

function nextMonth() {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
}

function renderAll() {
    cleanOldEvents();
    renderEvents();
    renderCalendar();
    updateEventCounter();
}
</script>

</body>
</html>
