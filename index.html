<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Eseménynaptár</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1f2933, #111827);
    color: #e5e7eb;
}

header {
    text-align: center;
    padding: 30px 20px;
    font-size: 28px;
    font-weight: 700;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 20px;
}

.card {
    background: #1f2937;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

h2 { margin-top: 0; }

input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
}

input, select {
    background: #111827;
    color: #e5e7eb;
}

button {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.event {
    background: #111827;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
    border-left: 4px solid #8b5cf6;
}

.status {
    margin-top:5px;
    font-size:12px;
    color:#22c55e;
    font-weight:600;
}

.calendar-header {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.calendar-header button {
    flex: 1;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

.day {
    background: #111827;
    border-radius: 12px;
    padding: 10px;
    min-height: 90px;
    font-size: 12px;
}

.event-dot {
    margin-top: 6px;
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 10px;
    background: #6366f1;
    color: white;
}

@media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<header>Eseménynaptár</header>

<div class="container">

<div class="card">
<h2>Új esemény</h2>

<input type="text" id="title" placeholder="Esemény neve">
<input type="date" id="date">

<select id="category">
<option>Oktatás</option>
<option>Sport</option>
<option>Szórakozás</option>
<option>Vizsga</option>
</select>

<button onclick="addEvent()">Hozzáadás</button>

<h2 style="margin-top:25px;">Események</h2>
<div id="eventList"></div>
</div>

<div class="card">

<h2 id="monthYear" style="text-align:center;"></h2>

<div class="calendar-header">
<button onclick="prevMonth()">‹</button>
<button onclick="nextMonth()">›</button>
</div>

<div class="calendar" id="calendar"></div>

</div>

</div>

<script>
let events = JSON.parse(localStorage.getItem("events")) || [];

let currentDate = new Date();
let currentMonth = currentDate.getMonth();
let currentYear = currentDate.getFullYear();

window.onload = function () {
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("date").min = today;
};

function saveEvents() {
    localStorage.setItem("events", JSON.stringify(events));
}

function cleanOldEvents() {
    const now = new Date();
    now.setHours(0,0,0,0);

    events = events.filter(e => {
        const d = new Date(e.date);
        return d >= now;
    });

    saveEvents();
}

function addEvent() {
    const title = document.getElementById("title").value;
    const date = document.getElementById("date").value;
    const category = document.getElementById("category").value;

    if (!title || !date) return alert("Tölts ki minden mezőt!");

    events.push({ title, date, category });
    saveEvents();

    renderAll();
}

function renderEvents() {
    const list = document.getElementById("eventList");
    list.innerHTML = "";

    const today = new Date();
    today.setHours(0,0,0,0);

    events.sort((a,b) => new Date(a.date) - new Date(b.date));

    events.forEach(e => {
        const d = new Date(e.date);
        let status = "";

        if (d.getTime() === today.getTime()) {
            status = `<div class="status">Folyamatban</div>`;
        }

        list.innerHTML += `
            <div class="event">
                <strong>${e.title}</strong><br>
                ${e.date}<br>
                ${e.category}
                ${status}
            </div>`;
    });
}

function renderCalendar() {
    const cal = document.getElementById("calendar");
    const monthYear = document.getElementById("monthYear");
    cal.innerHTML = "";

    const months = ["Január","Február","Március","Április","Május","Június",
                    "Július","Augusztus","Szeptember","Október","November","December"];

    monthYear.textContent = months[currentMonth] + " " + currentYear;

    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let i = 1; i <= daysInMonth; i++) {
        const dayBox = document.createElement("div");
        dayBox.className = "day";
        dayBox.innerHTML = `<strong>${i}</strong>`;

        events.forEach(e => {
            const d = new Date(e.date);
            if (d.getDate() === i && d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                const dot = document.createElement("div");
                dot.className = "event-dot";
                dot.textContent = e.title;
                dayBox.appendChild(dot);
            }
        });

        cal.appendChild(dayBox);
    }
}

function prevMonth() {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
}

function nextMonth() {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
}

function renderAll() {
    cleanOldEvents();
    renderEvents();
    renderCalendar();
}

renderAll();
</script>

</body>
</html>
